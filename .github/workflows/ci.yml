name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write   # for OIDC-based registry auth (future)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/app

jobs:

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ai_tshoot
          POSTGRES_PASSWORD: ai_tshoot_dev
          POSTGRES_DB: ai_tshoot
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ai_tshoot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://ai_tshoot:ai_tshoot_dev@localhost:5432/ai_tshoot
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest tests/api/test_health.py tests/llm/ tests/workers/ -q --tb=short

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - name: Vitest
        working-directory: frontend
        run: npx vitest run

  helm-lint:
    name: Helm lint + render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.1
      - name: Build chart deps
        run: helm dependency update deploy/helm/ai-troubleshooting
      - name: Lint
        run: helm lint deploy/helm/ai-troubleshooting --set anthropic.defaultKey.existingSecret=test
      - name: Validation guard — missing default key fails
        run: |
          if helm template ci deploy/helm/ai-troubleshooting 2>/dev/null; then
            echo "Validation guard FAILED to fire" >&2
            exit 1
          fi
          echo "✓ guard fires"
      - name: Render — vanilla
        run: helm template ci deploy/helm/ai-troubleshooting --set anthropic.defaultKey.existingSecret=test --set ingress.enabled=true | head -200
      - name: Render — OpenShift overlay
        run: |
          helm template ci deploy/helm/ai-troubleshooting \
            -f deploy/helm/ai-troubleshooting/values-openshift.yaml \
            --set anthropic.defaultKey.existingSecret=test \
            | grep -q "kind: Route"
      - name: Render — prod overlay
        run: |
          helm template ci deploy/helm/ai-troubleshooting \
            -f deploy/helm/ai-troubleshooting/values-prod.yaml \
            --set anthropic.defaultKey.existingSecret=test \
            | grep -q "HorizontalPodAutoscaler"

  build-image:
    name: Build app image (multi-arch)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, helm-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push (sha tag only — release.yml owns SemVer tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          target: backend-prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
