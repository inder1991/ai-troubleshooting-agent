name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write     # create GitHub Release
  packages: write     # push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/app

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: ver
        run: |
          # v1.4.2 -> SEMVER=1.4.2, MAJOR=1, MINOR=1.4
          TAG="${GITHUB_REF#refs/tags/}"
          SEMVER="${TAG#v}"
          MAJOR="${SEMVER%%.*}"
          MINOR="${SEMVER%.*}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR"   >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR"   >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image (immutable tags only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          target: backend-prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.semver }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.minor }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.major }}
          # NOTE: NEVER add `:latest`. Hardcoded prohibition.

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.1

      - name: Sync chart appVersion to release tag
        run: |
          sed -i 's/^appVersion: .*/appVersion: "${{ steps.ver.outputs.semver }}"/' deploy/helm/ai-troubleshooting/Chart.yaml
          cat deploy/helm/ai-troubleshooting/Chart.yaml | grep -E "version:|appVersion:"

      - name: Build chart deps
        run: helm dependency update deploy/helm/ai-troubleshooting

      - name: Package + push chart to OCI registry
        run: |
          helm package deploy/helm/ai-troubleshooting -d /tmp/chart
          helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          # Chart version is independent of appVersion — read from Chart.yaml.
          CHART_VERSION=$(awk '/^version:/ {print $2; exit}' deploy/helm/ai-troubleshooting/Chart.yaml)
          helm push "/tmp/chart/ai-troubleshooting-${CHART_VERSION}.tgz" oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ steps.ver.outputs.tag }}
          tag_name: ${{ steps.ver.outputs.tag }}
          body: |
            ## Image
            `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.semver }}` (multi-arch: linux/amd64, linux/arm64)

            ## Chart
            `oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/ai-troubleshooting`

            ## Upgrade
            ```bash
            helm upgrade ai-tshoot oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/ai-troubleshooting \
              -n ai-tshoot \
              --set image.tag=${{ steps.ver.outputs.semver }}
            ```
