<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Zepay Demo Control</title>
<style>
  :root {
    --bg: #0e0f13;
    --ink: #e6e7ea;
    --muted: #8b8e95;
    --ok: #58c58d;
    --warn: #e8a74a;
    --bad: #e26464;
    --border: #242833;
    --card: #14161d;
    --amber: #e09f3e;
  }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    margin: 0; padding: 24px;
    max-width: 820px; margin: 0 auto;
  }
  h1 { font-weight: 500; letter-spacing: 0.02em; font-size: 18px; margin: 0 0 16px; }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
       color: var(--muted); margin: 18px 0 8px; font-weight: 600; }
  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.ok { background: var(--ok); }
  .dot.bad { background: var(--bad); }
  .dot.idle { background: var(--muted); }
  .muted { color: var(--muted); font-size: 12px; }
  button {
    background: #191c24; color: var(--ink);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 14px; font-family: inherit; font-size: 13px;
    cursor: pointer; margin: 4px 4px 4px 0;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover:not(:disabled) { background: #202530; border-color: var(--amber); }
  button.primary { border-color: var(--amber); color: var(--amber); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  pre { margin: 0; font-size: 11px; color: var(--muted);
        max-height: 180px; overflow-y: auto; white-space: pre-wrap; }
  a { color: var(--amber); text-decoration: none; margin-right: 12px; }
  a:hover { text-decoration: underline; }
  .timing { font-variant-numeric: tabular-nums;
            font-family: "SF Mono", Menlo, monospace; }
</style>
</head>
<body>

<h1>Zepay Demo Control</h1>

<div class="card">
  <h2>Cluster health</h2>
  <div class="row" id="health-row">
    <span class="row"><span class="dot idle" id="h-es"></span> ES</span>
    <span class="row"><span class="dot idle" id="h-prom"></span> Prom</span>
    <span class="row"><span class="dot idle" id="h-jaeger"></span> Jaeger</span>
    <span class="row"><span class="dot idle" id="h-k8s"></span> K8s</span>
    <button id="btn-healthcheck">Re-check</button>
  </div>
</div>

<div class="card">
  <h2>Scenario state</h2>
  <div class="muted" id="state-line">loading…</div>
  <div class="muted timing" id="timing-line" style="margin-top: 6px;"></div>
</div>

<div class="card">
  <h2>Controls</h2>
  <div class="grid">
    <button id="btn-reset">Reset</button>
    <button id="btn-traffic">Start Traffic (50 RPS)</button>
    <button id="btn-fault">Inject Fault</button>
    <button id="btn-trigger" class="primary">Trigger Incident</button>
    <button id="btn-spike">Spike RPS → 500 (60s)</button>
    <button id="btn-history">Seed History</button>
  </div>
</div>

<div class="card">
  <h2>Open</h2>
  <a href="http://localhost:5173" target="_blank">War Room</a>
  <a href="http://localhost:16686" target="_blank">Jaeger</a>
  <a href="http://localhost:9090" target="_blank">Prometheus</a>
  <a href="http://localhost:5601" target="_blank">Kibana</a>
</div>

<div class="card">
  <h2>Last response</h2>
  <pre id="log">(no action yet)</pre>
</div>

<script>
const $ = (id) => document.getElementById(id);
const log = (obj) => { $("log").textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2); };

async function post(url) {
  const r = await fetch(url, { method: 'POST' });
  const body = await r.json().catch(() => ({}));
  log({status: r.status, ...body});
  refreshState();
  return body;
}

async function refreshState() {
  try {
    const r = await fetch('/demo/state');
    const s = await r.json();
    $("state-line").textContent =
      `Traffic: ${s.traffic_on ? 'on' : 'off'} · ` +
      `Fault: ${s.fault_on ? 'on' : 'off'} · ` +
      `Incident: ${s.current_incident_id ?? '—'} · ` +
      `History seeded: ${s.history_seeded ? 'yes' : 'no'}`;
    if (s.last_trigger_ts) {
      const started = new Date(s.last_trigger_ts);
      const elapsed_s = Math.max(0, Math.floor((Date.now() - started.getTime()) / 1000));
      const mm = String(Math.floor(elapsed_s / 60)).padStart(2, '0');
      const ss = String(elapsed_s % 60).padStart(2, '0');
      $("timing-line").textContent = `triggered ${mm}:${ss} ago · expected verdict ~01:30`;
    } else {
      $("timing-line").textContent = '';
    }
  } catch (e) { /* silent */ }
}

async function refreshHealth() {
  try {
    const r = await fetch('/demo/healthcheck', { method: 'POST' });
    const { checks } = await r.json();
    for (const k of ['elasticsearch','prometheus','jaeger','k8s']) {
      const el = $("h-" + k.replace('elasticsearch','es').replace('prometheus','prom'));
      if (!el) continue;
      el.classList.remove('ok','bad','idle');
      el.classList.add(checks[k]?.ok ? 'ok' : 'bad');
    }
  } catch (e) { /* silent */ }
}

$("btn-healthcheck").onclick = refreshHealth;
$("btn-reset").onclick         = () => post('/demo/reset');
$("btn-traffic").onclick       = () => post('/demo/start-traffic?rps=50');
$("btn-fault").onclick         = () => post('/demo/inject-fault');
$("btn-trigger").onclick       = () => post('/demo/trigger-incident');
$("btn-spike").onclick         = () => post('/demo/spike?rps=500&duration_s=60');
$("btn-history").onclick       = () => post('/demo/historical-seed');

// initial
refreshHealth();
refreshState();
setInterval(refreshState, 2000);
setInterval(refreshHealth, 15000);
</script>
</body>
</html>
