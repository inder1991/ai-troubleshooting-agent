# Defaults applied to every service release. Per-service values.yaml
# overrides `name`, `image`, `port`, `env`, and optionally `resources`
# + `replicas`.

name: ""          # REQUIRED (per-release)
namespace: payments-prod

image:
  repository: ""  # REQUIRED (per-release)
  tag:        demo-0.1.0
  pullPolicy: IfNotPresent

port: 8080

replicas: 2

resources:
  requests: {cpu: 100m, memory: 128Mi}
  limits:   {cpu: 300m, memory: 256Mi}

env: []
# Example:
#   env:
#   - name: CHECKOUT_URL
#     value: http://checkout-service:8083
#   - name: PG_SCHEMA
#     value: wallet

# Istio sidecar resource overrides — applied as pod annotations so the
# sidecar injector scales the envoy container down. Kind memory budget
# is tight (~8 GiB node), default Istio sidecar asks for 100m / 128Mi
# per pod × 10 pods = 1.28 GiB before any app work. Here we cut to 1/3.
# Re-apply-safe: every helm upgrade writes these under
# spec.template.metadata.annotations, so future rollouts keep the
# override.
sidecar:
  proxyCPU:         33m
  proxyMemory:      43Mi
  proxyCPULimit:    666m
  proxyMemoryLimit: 341Mi

serviceMonitor:
  enabled: true
  interval: 15s
  # Most services expose Prometheus at /metrics; Spring Boot's Actuator
  # defaults to /actuator/prometheus — per-service override.
  path: /metrics
  labels:
    release: kube-prometheus-stack
