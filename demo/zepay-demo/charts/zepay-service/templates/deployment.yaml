apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name | required "values.name is required" }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
    zepay.demo/role: scenario-service
spec:
  replicas: {{ .Values.replicas }}
  selector: {matchLabels: {app: {{ .Values.name }}}}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        zepay.demo/role: scenario-service
      annotations:
        {{- with .Values.sidecar }}
        sidecar.istio.io/proxyCPU:         {{ .proxyCPU | quote }}
        sidecar.istio.io/proxyMemory:      {{ .proxyMemory | quote }}
        sidecar.istio.io/proxyCPULimit:    {{ .proxyCPULimit | quote }}
        sidecar.istio.io/proxyMemoryLimit: {{ .proxyMemoryLimit | quote }}
        {{- end }}
    spec:
      containers:
      - name: {{ .Values.name }}
        image: "{{ .Values.image.repository | required "values.image.repository is required" }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports: [{containerPort: {{ .Values.port }}, name: http}]
        env:
        - {name: PORT, value: {{ .Values.port | quote }}}
        - {name: OTEL_EXPORTER_OTLP_ENDPOINT,
           value: "jaeger-collector.observability.svc.cluster.local:4317"}
        {{- with .Values.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        resources: {{ toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet: {path: /livez, port: {{ .Values.port }}}
          periodSeconds: 10
        readinessProbe:
          httpGet: {path: /readyz, port: {{ .Values.port }}}
          periodSeconds: 5
