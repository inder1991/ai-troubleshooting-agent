{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconciliation-job-web
  namespace: {{ .Values.namespace }}
  labels:
    app: reconciliation-job-web
    zepay.demo/role: scenario-service
spec:
  replicas: {{ .Values.web.replicas }}
  selector: {matchLabels: {app: reconciliation-job-web}}
  template:
    metadata:
      labels:
        app: reconciliation-job-web
        zepay.demo/role: scenario-service
    spec:
      containers:
      - name: reconciliation-job-web
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - {name: RECONCILE_MODE, value: web}
        - {name: PORT, value: {{ .Values.web.port | quote }}}
        - {name: RECONCILE_AUTO_ROUND_USD, value: {{ .Values.reconcileAutoRoundUsd | quote }}}
        - {name: RECONCILE_MINOR_DRIFT_USD, value: {{ .Values.reconcileMinorDriftUsd | quote }}}
        envFrom:
        - secretRef: {name: zepay-postgres-auth}
        ports: [{containerPort: {{ .Values.web.port }}, name: http}]
        resources: {{ toYaml .Values.web.resources | nindent 10 }}
        livenessProbe:
          httpGet: {path: /livez, port: {{ .Values.web.port }}}
          periodSeconds: 10
        readinessProbe:
          httpGet: {path: /readyz, port: {{ .Values.web.port }}}
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: reconciliation-job-web
  namespace: {{ .Values.namespace }}
  labels: {app: reconciliation-job-web}
spec:
  selector: {app: reconciliation-job-web}
  ports: [{name: http, port: {{ .Values.web.port }}, targetPort: {{ .Values.web.port }}}]
{{- if .Values.web.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: reconciliation-job-web
  namespace: {{ .Values.namespace }}
  labels:
    {{- toYaml .Values.web.serviceMonitor.labels | nindent 4 }}
spec:
  selector: {matchLabels: {app: reconciliation-job-web}}
  namespaceSelector: {matchNames: [{{ .Values.namespace }}]}
  endpoints:
  - port: http
    path: /metrics
    interval: {{ .Values.web.serviceMonitor.interval }}
{{- end }}
{{- end }}
