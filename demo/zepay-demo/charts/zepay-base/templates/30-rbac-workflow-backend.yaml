{{/*
  Read-only kubeconfig the workflow backend (running on your laptop)
  uses when k8s_agent queries the cluster. It can LIST/GET pods,
  services, deployments, events, endpoints — nothing more. No writes,
  no secret reads, no exec, no logs-streaming, no port-forward from
  this SA (you port-forward with your own admin kubeconfig, not this
  one).
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.workflowBackend.serviceAccountName }}
  namespace: {{ .Values.namespaces.scenario }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.workflowBackend.clusterRoleName }}
rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - endpoints
    - events
    - configmaps
    - namespaces
    - nodes
  verbs: [get, list, watch]
- apiGroups: [apps]
  resources: [deployments, replicasets, statefulsets, daemonsets]
  verbs: [get, list, watch]
- apiGroups: [networking.istio.io]
  resources: [virtualservices, gateways, destinationrules]
  verbs: [get, list, watch]
- apiGroups: [monitoring.coreos.com]
  resources: [servicemonitors, podmonitors]
  verbs: [get, list, watch]
# Deliberately omitted: pods/exec, pods/portforward, pods/log,
# secrets (all sensitivity), CRDs beyond the two groups above,
# any write verbs.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.workflowBackend.clusterRoleName }}-binding
subjects:
- kind: ServiceAccount
  name: {{ .Values.workflowBackend.serviceAccountName }}
  namespace: {{ .Values.namespaces.scenario }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.workflowBackend.clusterRoleName }}
  apiGroup: rbac.authorization.k8s.io
