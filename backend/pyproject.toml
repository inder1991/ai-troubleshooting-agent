# Backend Python tooling configuration.
#
# Q9: pytest + Hypothesis + diff-cover. Patch coverage gate (≥ 90 %)
# is enforced by tools/run_validate.py wiring (Sprint H.1a).
# Q19: mypy strict per-module config lands in Sprint H.0b Story 12.

[tool.pytest.ini_options]
asyncio_mode = "strict"
testpaths = ["backend/tests", "tests/harness"]
markers = [
    "property: Hypothesis property-based test (slower; skip with -m 'not property').",
    "slow: integration / slow test (skip with -m 'not slow').",
]
addopts = [
    "--strict-markers",
    "-q",
]

# Q15 — pydocstyle (D rules) on contract surfaces. Tests + private
# helpers exempt; documentation_policy.py (Sprint H.1c) enforces the
# spine paths via a richer check.
[tool.ruff.lint]
select = ["E", "F", "I", "B", "D"]
ignore = [
    "D100",  # Missing docstring in public module — too noisy for v1
    "D104",  # Missing docstring in public package
    "D203",  # 1 blank line required before docstring (conflicts with D211)
    "D213",  # Multi-line docstring summary should start at the second line
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D"]                  # tests don't need docstrings
"backend/tests/**" = ["D"]
"backend/src/**/_*.py" = ["D"]      # private helpers exempt

# Q18 — import discipline: alphabetized, sectioned, src is first-party.
[tool.ruff.lint.isort]
force-single-line = false
force-sort-within-sections = true
known-first-party = ["src"]

# Q19 — mypy strict per-module on the spine. Drift detection (no new
# errors allowed; baseline-growth requires ADR) lands in Sprint H.1d.
[tool.mypy]
python_version = "3.14"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["src.storage.*", "src.learning.*", "src.models.*", "src.api.*"]
strict = true

[[tool.mypy.overrides]]
module = "src.agents.*.runners.*"
strict = true
