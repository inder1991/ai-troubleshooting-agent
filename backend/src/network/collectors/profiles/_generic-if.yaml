# Generic interface metrics — ifTable / ifXTable.
# Extended by most device profiles.

metrics:
  - MIB: IF-MIB
    table:
      OID: 1.3.6.1.2.1.2.2
      name: ifTable
    symbols:
      - OID: 1.3.6.1.2.1.2.2.1.8
        name: ifOperStatus
        metric_type: gauge
      - OID: 1.3.6.1.2.1.2.2.1.7
        name: ifAdminStatus
        metric_type: gauge
      - OID: 1.3.6.1.2.1.2.2.1.5
        name: ifSpeed
        metric_type: gauge
      - OID: 1.3.6.1.2.1.2.2.1.10
        name: ifInOctets
        metric_type: counter
      - OID: 1.3.6.1.2.1.2.2.1.16
        name: ifOutOctets
        metric_type: counter
      - OID: 1.3.6.1.2.1.2.2.1.14
        name: ifInErrors
        metric_type: counter
      - OID: 1.3.6.1.2.1.2.2.1.20
        name: ifOutErrors
        metric_type: counter
      - OID: 1.3.6.1.2.1.2.2.1.13
        name: ifInDiscards
        metric_type: counter
      - OID: 1.3.6.1.2.1.2.2.1.19
        name: ifOutDiscards
        metric_type: counter
    metric_tags:
      - tag: interface
        column:
          OID: 1.3.6.1.2.1.2.2.1.2
          name: ifDescr

  # ifXTable — 64-bit counters (HC)
  - MIB: IF-MIB
    table:
      OID: 1.3.6.1.2.1.31.1.1
      name: ifXTable
    symbols:
      - OID: 1.3.6.1.2.1.31.1.1.1.6
        name: ifHCInOctets
        metric_type: counter
      - OID: 1.3.6.1.2.1.31.1.1.1.10
        name: ifHCOutOctets
        metric_type: counter
      - OID: 1.3.6.1.2.1.31.1.1.1.15
        name: ifHighSpeed
        metric_type: gauge
    metric_tags:
      - tag: interface
        column:
          OID: 1.3.6.1.2.1.31.1.1.1.1
          name: ifName
