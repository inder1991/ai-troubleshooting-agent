# Juniper JunOS (MX, EX, SRX, QFX).

sysobjectid:
  - 1.3.6.1.4.1.2636.*            # All Juniper devices

extends:
  - _base.yaml
  - _generic-if.yaml
  - _generic-ip.yaml

vendor: juniper
device_type: router

metrics:
  # CPU — Juniper operating table
  - MIB: JUNIPER-MIB
    table:
      OID: 1.3.6.1.4.1.2636.3.1.13
      name: jnxOperatingTable
    symbols:
      - OID: 1.3.6.1.4.1.2636.3.1.13.1.8
        name: jnxOperatingCPU
        metric_type: gauge
      - OID: 1.3.6.1.4.1.2636.3.1.13.1.11
        name: jnxOperatingBuffer
        metric_type: gauge
      - OID: 1.3.6.1.4.1.2636.3.1.13.1.7
        name: jnxOperatingTemp
        metric_type: gauge
      - OID: 1.3.6.1.4.1.2636.3.1.13.1.15
        name: jnxOperatingMemory
        metric_type: gauge
      - OID: 1.3.6.1.4.1.2636.3.1.13.1.6
        name: jnxOperatingState
        metric_type: gauge
    metric_tags:
      - tag: component
        column:
          OID: 1.3.6.1.4.1.2636.3.1.13.1.5
          name: jnxOperatingDescr

  # Firewall filter counters (SRX)
  - MIB: JUNIPER-FIREWALL-MIB
    table:
      OID: 1.3.6.1.4.1.2636.3.5.2
      name: jnxFWCounterTable
    symbols:
      - OID: 1.3.6.1.4.1.2636.3.5.2.1.4
        name: jnxFWCounterPacketCount
        metric_type: counter
      - OID: 1.3.6.1.4.1.2636.3.5.2.1.5
        name: jnxFWCounterByteCount
        metric_type: counter
    metric_tags:
      - tag: filter_name
        column:
          OID: 1.3.6.1.4.1.2636.3.5.2.1.1
          name: jnxFWCounterFilterName

  # BGP
  - MIB: BGP4-MIB
    table:
      OID: 1.3.6.1.2.1.15.3
      name: bgpPeerTable
    symbols:
      - OID: 1.3.6.1.2.1.15.3.1.2
        name: bgpPeerState
        metric_type: gauge
    metric_tags:
      - tag: peer_ip
        column:
          OID: 1.3.6.1.2.1.15.3.1.7
          name: bgpPeerRemoteAddr

metadata:
  device:
    fields:
      vendor:
        value: "juniper"
      serial_number:
        symbol:
          OID: 1.3.6.1.4.1.2636.3.1.3.0
          name: jnxBoxSerialNo
