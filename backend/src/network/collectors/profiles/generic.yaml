# Generic fallback profile for unknown sysObjectID.
# Collects only base system metrics + interface table.

sysobjectid:
  - "*"                            # Matches anything not matched by a specific profile

extends:
  - _base.yaml
  - _generic-if.yaml
  - _generic-ip.yaml

vendor: unknown
device_type: unknown

metrics: []

metadata:
  device:
    fields:
      vendor:
        value: "unknown"
