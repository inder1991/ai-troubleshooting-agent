# Cisco IOS-XE routers (ISR, ASR, C8000V, CSR1000V).

sysobjectid:
  - 1.3.6.1.4.1.9.12.3.1.3.*     # C8000V, CSR1000V
  - 1.3.6.1.4.1.9.1.1045          # ISR 4331
  - 1.3.6.1.4.1.9.1.1046          # ISR 4351
  - 1.3.6.1.4.1.9.1.2066          # ISR 1100
  - 1.3.6.1.4.1.9.1.2497          # ASR 1001-HX

extends:
  - _base.yaml
  - _generic-if.yaml
  - _generic-ip.yaml

vendor: cisco
device_type: router

metrics:
  # CPU
  - MIB: CISCO-PROCESS-MIB
    table:
      OID: 1.3.6.1.4.1.9.9.109.1.1.1
      name: cpmCPUTotalTable
    symbols:
      - OID: 1.3.6.1.4.1.9.9.109.1.1.1.1.10
        name: cpmCPUTotalMonIntervalValue
        metric_type: gauge
      - OID: 1.3.6.1.4.1.9.9.109.1.1.1.1.12
        name: cpmCPUMemoryUsed
        metric_type: gauge
      - OID: 1.3.6.1.4.1.9.9.109.1.1.1.1.13
        name: cpmCPUMemoryFree
        metric_type: gauge
    metric_tags:
      - tag: cpu_index
        index: 1

  # Memory pools
  - MIB: CISCO-MEMORY-POOL-MIB
    table:
      OID: 1.3.6.1.4.1.9.9.48.1.1
      name: ciscoMemoryPoolTable
    symbols:
      - OID: 1.3.6.1.4.1.9.9.48.1.1.1.5
        name: ciscoMemoryPoolUsed
        metric_type: gauge
      - OID: 1.3.6.1.4.1.9.9.48.1.1.1.6
        name: ciscoMemoryPoolFree
        metric_type: gauge
    metric_tags:
      - tag: pool_name
        column:
          OID: 1.3.6.1.4.1.9.9.48.1.1.1.2
          name: ciscoMemoryPoolName

  # Temperature
  - MIB: CISCO-ENVMON-MIB
    symbol:
      OID: 1.3.6.1.4.1.9.9.13.1.3.1.3
      name: ciscoEnvMonTemperatureValue
      metric_type: gauge

  # BGP peers
  - MIB: BGP4-MIB
    table:
      OID: 1.3.6.1.2.1.15.3
      name: bgpPeerTable
    symbols:
      - OID: 1.3.6.1.2.1.15.3.1.2
        name: bgpPeerState
        metric_type: gauge
      - OID: 1.3.6.1.2.1.15.3.1.16
        name: bgpPeerFsmEstablishedTransitions
        metric_type: counter
    metric_tags:
      - tag: peer_ip
        column:
          OID: 1.3.6.1.2.1.15.3.1.7
          name: bgpPeerRemoteAddr

metadata:
  device:
    fields:
      vendor:
        value: "cisco"
      serial_number:
        symbol:
          OID: 1.3.6.1.4.1.9.9.92.1.1.1.2.0
          name: entPhysicalSerialNum
