# Arista EOS switches.

sysobjectid:
  - 1.3.6.1.4.1.30065.*           # All Arista devices

extends:
  - _base.yaml
  - _generic-if.yaml
  - _generic-ip.yaml

vendor: arista
device_type: switch

metrics:
  # CPU — Arista uses HOST-RESOURCES-MIB hrProcessorLoad
  - MIB: HOST-RESOURCES-MIB
    table:
      OID: 1.3.6.1.2.1.25.3.3
      name: hrProcessorTable
    symbols:
      - OID: 1.3.6.1.2.1.25.3.3.1.2
        name: hrProcessorLoad
        metric_type: gauge
    metric_tags:
      - tag: cpu_index
        index: 1

  # Memory
  - MIB: HOST-RESOURCES-MIB
    table:
      OID: 1.3.6.1.2.1.25.2.3
      name: hrStorageTable
    symbols:
      - OID: 1.3.6.1.2.1.25.2.3.1.6
        name: hrStorageUsed
        metric_type: gauge
      - OID: 1.3.6.1.2.1.25.2.3.1.5
        name: hrStorageSize
        metric_type: gauge
    metric_tags:
      - tag: storage_descr
        column:
          OID: 1.3.6.1.2.1.25.2.3.1.3
          name: hrStorageDescr

  # Temperature — ENTITY-SENSOR-MIB
  - MIB: ENTITY-SENSOR-MIB
    table:
      OID: 1.3.6.1.2.1.99.1.1
      name: entPhySensorTable
    symbols:
      - OID: 1.3.6.1.2.1.99.1.1.1.4
        name: entPhySensorValue
        metric_type: gauge
    metric_tags:
      - tag: sensor_type
        column:
          OID: 1.3.6.1.2.1.99.1.1.1.1
          name: entPhySensorType

  # BGP
  - MIB: BGP4-MIB
    table:
      OID: 1.3.6.1.2.1.15.3
      name: bgpPeerTable
    symbols:
      - OID: 1.3.6.1.2.1.15.3.1.2
        name: bgpPeerState
        metric_type: gauge
    metric_tags:
      - tag: peer_ip
        column:
          OID: 1.3.6.1.2.1.15.3.1.7
          name: bgpPeerRemoteAddr

metadata:
  device:
    fields:
      vendor:
        value: "arista"
      serial_number:
        symbol:
          OID: 1.3.6.1.2.1.47.1.1.1.1.11.1
          name: entPhysicalSerialNum
