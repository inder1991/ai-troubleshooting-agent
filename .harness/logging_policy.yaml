spine_paths:
  - backend/src/api/**
  - backend/src/services/**
  - backend/src/storage/**
  - backend/src/agents/**

logger_attr_names:
  - info
  - warning
  - error
  - debug
  - critical
  - exception

secret_log_patterns:
  - "password="
  - "passwd="
  - "secret="
  - "api_key="
  - "apikey="
  - "token="
  - "bearer "
  - "authorization:"
