apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-troubleshooting-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: oci://nexus.internal/charts
      chart: ai-troubleshooting
      targetRevision: 0.1.0                         # bump for promotion
      helm:
        releaseName: ai-tshoot
        valueFiles:
          - $values/envs/staging/values.yaml
    - repoURL: https://github.com/inder1991/acme-platform-gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-tshoot-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
