# prod environment overrides — full capacity, OpenShift-flavoured.

image:
  tag: ""              # bumped only after staging soak passes
  pullPolicy: IfNotPresent

# Picks up the chart's values-openshift.yaml + values-prod.yaml-equivalent
# tunings inline (rather than referencing them from the chart, since gitops
# repo stays decoupled from chart-internal layout).

openshift:
  enabled: true
ingress:
  enabled: false
route:
  enabled: true
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

web:
  replicaCount: 3
  resources:
    requests: {cpu: 500m, memory: 1Gi}
    limits:   {cpu: 2,    memory: 4Gi}
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 12

worker:
  replicaCount: 3
  resources:
    requests: {cpu: 1, memory: 2Gi}
    limits:   {cpu: 4, memory: 8Gi}
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10

postgresql:
  primary:
    persistence:
      size: 50Gi
    resources:
      requests: {cpu: 1, memory: 2Gi}
      limits:   {cpu: 4, memory: 8Gi}
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

redis:
  master:
    persistence:
      size: 8Gi
    resources:
      requests: {cpu: 250m, memory: 512Mi}
      limits:   {cpu: 1,    memory: 1Gi}
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

backup:
  enabled: true
  schedule: "0 1 * * *"
  retentionDays: 30
  storage:
    size: 100Gi

anthropic:
  defaultKey:
    existingSecret: anthropic-default
  # Production usually has a per-billing-bucket setup; example below.
  namedKeys: []
    # - name: premium
    #   existingSecret: anthropic-premium
    #   secretKey: api_key

serviceMonitor:
  enabled: true
prometheusRule:
  enabled: true
dashboards:
  enabled: true

networkPolicy:
  enabled: true
  egressAllowlist:
    # Anthropic API only (plus DNS, plus bundled DB/Redis added by chart).
    cidrs:
      - 0.0.0.0/0   # PRODUCTION: replace with Anthropic CIDR + customer integrations
