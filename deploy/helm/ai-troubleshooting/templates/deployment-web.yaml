{{- include "aitsh.validate" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aitsh.fullname" . }}-web
  labels:
    {{- include "aitsh.labels" . | nindent 4 }}
    {{- with .Values.web.podLabels }}{{- toYaml . | nindent 4 }}{{- end }}
spec:
  {{- if not .Values.web.hpa.enabled }}
  replicas: {{ .Values.web.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "aitsh.web.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "aitsh.web.selectorLabels" . | nindent 8 }}
        {{- with .Values.web.podLabels }}{{- toYaml . | nindent 8 }}{{- end }}
      {{- with .Values.web.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "aitsh.serviceAccountName" . }}
      {{- if not .Values.openshift.enabled }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 10001
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.web.terminationGracePeriodSeconds }}
      containers:
        - name: web
          image: {{ include "aitsh.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if not .Values.openshift.enabled }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          {{- else }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "aitsh.fullname" . }}-config
          env:
            {{- include "aitsh.commonEnv" . | nindent 12 }}
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.web.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.web.probes.liveness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.web.probes.liveness.periodSeconds }}
            timeoutSeconds:      {{ .Values.web.probes.liveness.timeoutSeconds }}
            failureThreshold:    {{ .Values.web.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.web.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.web.probes.readiness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.web.probes.readiness.periodSeconds }}
            timeoutSeconds:      {{ .Values.web.probes.readiness.timeoutSeconds }}
            failureThreshold:    {{ .Values.web.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.web.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
