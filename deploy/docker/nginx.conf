server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA fallback — every unknown path returns index.html so React Router can
    # take over client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for hashed assets emitted by Vite.
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API + WS proxied to the backend service inside the compose/k8s network.
    # In compose this resolves to the backend-web service; in k8s the chart
    # uses an Ingress/Route in front of /api directly so this block is unused.
    location /api/ {
        proxy_pass         http://backend-web:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
