{{- include "aitsh.validate" . -}}
{{- if .Values.serviceMonitor.enabled -}}
{{/*
Prometheus Operator ServiceMonitor — off by default. Operator enables when
their cluster runs the Prometheus Operator (D.32 locked: assumed already in
cluster in prod). Customer's Grafana auto-discovers via the matching
serviceMonitorSelector.
*/}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "aitsh.fullname" . }}-web
  labels:
    {{- include "aitsh.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}{{- toYaml . | nindent 4 }}{{- end }}
spec:
  selector:
    matchLabels:
      {{- include "aitsh.web.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}
