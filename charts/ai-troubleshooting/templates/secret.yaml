{{- include "aitsh.validate" . -}}
{{/*
This Secret holds the COMPOSED DATABASE_URL + REDIS_URL with credentials
already inlined — easier for the app and avoids repeating the assembly in
every Deployment env block. The Anthropic API keys themselves stay in their
operator-pre-created Secrets and are referenced via valueFrom.secretKeyRef
directly in the Deployments.

The chart never includes a plaintext password in its own Secret data — it
references the upstream Secret(s) via stringData with `valueFrom`-style
construction. That means we generate the DATABASE_URL composition AT POD
START via env interpolation, not at chart-render time.

To do this we leave DATABASE_URL/REDIS_URL out of this Secret entirely and
build them in the Deployment env from POSTGRES_PASSWORD + REDIS_PASSWORD
(both pulled from upstream Secrets via valueFrom).
*/}}
{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aitsh.fullname" . }}-secrets
  labels:
    {{- include "aitsh.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Currently empty — all sensitive values come from operator-pre-created
  # Secrets referenced via valueFrom.secretKeyRef in the Deployments. This
  # template exists so the chart owns a Secret resource that can grow keys
  # later (e.g. shared encryption-at-rest keys, signing secrets) without
  # changing the Deployment-side referencing pattern.
  _placeholder: ""
{{- end -}}
