{{- include "aitsh.validate" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aitsh.fullname" . }}-web
  labels:
    {{- include "aitsh.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "aitsh.web.selectorLabels" . | nindent 4 }}
