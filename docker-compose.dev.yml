# DEPRECATED — use the full local stack instead.
#
#   make up
#
# This used to be a Postgres-only convenience for backend devs running
# `pytest` against a real DB. The full stack now lives in
# `infra/local/compose.dev.yml` (postgres + redis + web + worker + frontend).
#
# This file is kept as a one-service shim so existing dev scripts that
# `docker-compose -f docker-compose.dev.yml up -d postgres` keep working.
#
# To stop using this:
#   docker-compose -f docker-compose.dev.yml down
#   make up

services:
  postgres:
    image: postgres:15-alpine
    container_name: diagnostic-dev-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: diagnostic
      POSTGRES_PASSWORD: diagnostic
      POSTGRES_DB: diagnostic_dev
    volumes:
      - diagnostic_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diagnostic -d diagnostic_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  diagnostic_pg_data:
