# Local-dev infrastructure for the diagnostic-workflow hardening work.
# Postgres is the new durable store for outbox, audit log, agent priors and
# the eval store. Bring up with:
#
#     docker-compose -f docker-compose.dev.yml up -d postgres
#
# The default DATABASE_URL in backend/src/database/engine.py points here.

services:
  postgres:
    image: postgres:15
    container_name: diagnostic-dev-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: diagnostic
      POSTGRES_PASSWORD: diagnostic
      POSTGRES_DB: diagnostic_dev
    volumes:
      - diagnostic_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diagnostic -d diagnostic_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  diagnostic_pg_data:
